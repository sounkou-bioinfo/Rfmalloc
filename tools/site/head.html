<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --ink: #1c2320; --muted: #5b6660; --bg: #ffffff; --panel: #f6f8f7;
    --line: #dfe4e1; --accent: #0e7c66; --code-bg: #f3f5f4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #e3e8e5; --muted: #93a099; --bg: #141816; --panel: #1b201e;
      --line: #2a322d; --accent: #45c39f; --code-bg: #1e2422;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0 auto; max-width: 60rem; padding: 2.5rem 1.25rem 5rem;
    background: var(--bg); color: var(--ink);
    font: 16px/1.65 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  h1 { font-size: 2rem; line-height: 1.2; margin: 0 0 .75rem; letter-spacing: -.01em; }
  h1.title { border-bottom: 2px solid var(--ink); padding-bottom: .6rem; }
  h2 { margin-top: 2.75rem; padding-bottom: .3rem; border-bottom: 1px solid var(--line); font-size: 1.35rem; }
  h3 { margin-top: 1.75rem; font-size: 1.1rem; }
  p, li { max-width: 68ch; }
  a { color: var(--accent); text-underline-offset: 2px; }
  code {
    background: var(--code-bg); border: 1px solid var(--line); border-radius: 3px;
    padding: .05em .35em; font-size: .88em;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  pre {
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 1rem 1.1rem; overflow-x: auto;
  }
  pre code { background: none; border: 0; padding: 0; font-size: .85em; }
  table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; margin: 1.25rem 0; }
  th, td { border: 1px solid var(--line); padding: .5rem .7rem; text-align: left; vertical-align: top; }
  th { background: var(--panel); font-size: .85rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  img { max-width: 100%; }
  blockquote { border-left: 3px solid var(--accent); margin: 1rem 0; padding: .25rem 1rem; color: var(--muted); }
</style>
