# Monorepo CI for the out-of-core array stack.
#
# One matrix checks each package from its packages/<pkg> subdirectory; sibling
# dependencies are installed from the *local checkout* (not from Remotes) so a
# commit that changes several packages is validated as one unit. The final
# integration job installs the whole stack in dependency order and runs every
# package's tinytest suite - the cross-package consistency tests (codec vs
# GGML reference, typed-GEMM bridge vs decode path) live there.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.pkg }} / ${{ matrix.os }} (${{ matrix.r }})

    strategy:
      fail-fast: false
      matrix:
        include:
          # Rfmalloc: the substrate - full platform matrix (incl. Windows + ARM).
          # macos-latest is Apple Silicon (aarch64); ubuntu-24.04-arm covers
          # Linux aarch64 (Graviton, Ampere, Pi). Together they turn "should
          # build on ARM" into "does build on ARM".
          - {pkg: Rfmalloc, os: macos-latest,   r: 'release'}
          - {pkg: Rfmalloc, os: ubuntu-24.04-arm, r: 'release'}
          - {pkg: Rfmalloc, os: windows-latest, r: 'release'}
          - {pkg: Rfmalloc, os: ubuntu-latest,  r: 'devel'}
          - {pkg: Rfmalloc, os: ubuntu-latest,  r: 'release'}
          - {pkg: Rfmalloc, os: ubuntu-latest,  r: 'oldrel-1'}
          # Rggml now builds on Windows too (Rtools/MinGW: configure.win writes
          # src/Makevars.win without -ldl). Rgguf/Rllm stay unix for now - Rgguf's
          # vendored gguflib mmaps the GGUF file with no _WIN32 path.
          - {pkg: Rggml,    os: windows-latest, r: 'release'}
          - {pkg: Rggml,    os: ubuntu-24.04-arm, r: 'release'}
          # Unix-only packages (OS_type: unix).
          - {pkg: Rgguf,    os: ubuntu-latest,  r: 'release'}
          - {pkg: Rgguf,    os: ubuntu-latest,  r: 'devel'}
          - {pkg: Rgguf,    os: macos-latest,   r: 'release'}
          - {pkg: Rgguf,    os: ubuntu-24.04-arm, r: 'release'}
          - {pkg: Rggml,    os: ubuntu-latest,  r: 'release'}
          - {pkg: Rggml,    os: ubuntu-latest,  r: 'devel'}
          - {pkg: Rggml,    os: macos-latest,   r: 'release'}
          - {pkg: Rllm,     os: ubuntu-latest,  r: 'release'}
          - {pkg: Rllm,     os: ubuntu-latest,  r: 'devel'}
          - {pkg: Rllm,     os: macos-latest,   r: 'release'}
          - {pkg: Rllm,     os: ubuntu-24.04-arm, r: 'release'}
          # Rpgen vendors pgenlib (LGPL-3) + zstd/libdeflate/simde. Windows is
          # held until the vendored Windows build (Makevars.win/.ucrt) is
          # verified here; pgenlibr proves it builds on Windows, so it is a
          # follow-up, not a barrier.
          - {pkg: Rpgen,    os: ubuntu-latest,  r: 'release'}
          - {pkg: Rpgen,    os: ubuntu-latest,  r: 'devel'}
          - {pkg: Rpgen,    os: macos-latest,   r: 'release'}
          - {pkg: Rpgen,    os: ubuntu-24.04-arm, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install CRAN tooling
        run: |
          install.packages("pak", repos = sprintf("https://r-lib.github.io/p/pak/stable/%s/%s/%s", .Platform$pkgType, R.Version()$os, R.Version()$arch))
          pak::pkg_install(c("any::rcmdcheck", "any::tinytest"), ask = FALSE)
        shell: Rscript {0}

      # Siblings come from THIS checkout via plain R CMD INSTALL - never from
      # pak's solver, which would resolve the DESCRIPTIONs' Remotes refs
      # against GitHub main and validate the wrong code on pull requests.
      - name: Install sibling packages from the local checkout
        run: |
          case "${{ matrix.pkg }}" in
            Rgguf) siblings="Rfmalloc" ;;
            Rpgen) siblings="Rfmalloc" ;;
            Rllm)  siblings="Rfmalloc Rggml Rgguf" ;;
            *)     siblings="" ;;
          esac
          for s in $siblings; do
            echo "==== R CMD INSTALL packages/$s ===="
            R CMD INSTALL "packages/$s" || exit 1
          done
        shell: bash

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: packages/${{ matrix.pkg }}
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  vendored-ggml-matches-recipe:
    runs-on: ubuntu-latest
    name: vendored GGML == recipe
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      # Guard against silent hand-edits of packages/Rggml/inst/ggml: re-derive
      # it from the pinned ggmlR tarball + patches/ + overlay/ and assert equal.
      - name: vendorggml.R check
        run: Rscript tools/vendor-ggml/vendorggml.R check

  vendored-pgenlib-matches-recipe:
    runs-on: ubuntu-latest
    name: vendored pgenlib == recipe
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      # Guard against silent hand-edits of packages/Rpgen's vendored pgenlib:
      # re-derive it from the pinned pgenlibr CRAN tarball and assert equal.
      - name: vendorpgen.R check
        run: Rscript tools/vendor-pgenlib/vendorpgen.R check

  integration:
    runs-on: ubuntu-latest
    name: integration (full stack)
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install CRAN tooling
        run: |
          install.packages("pak", repos = sprintf("https://r-lib.github.io/p/pak/stable/%s/%s/%s", .Platform$pkgType, R.Version()$os, R.Version()$arch))
          pak::pkg_install("any::tinytest", ask = FALSE)
        shell: Rscript {0}

      # Same rule as the check jobs: the stack under test is THIS checkout,
      # installed with R CMD INSTALL in dependency order (no Remotes solving).
      - name: Install the whole stack in dependency order
        run: |
          for p in Rfmalloc Rggml Rgguf Rllm; do
            echo "==== R CMD INSTALL packages/$p ===="
            R CMD INSTALL "packages/$p" || exit 1
          done
        shell: bash

      - name: Run every package's tinytest suite against the co-installed stack
        run: Rscript tests/integration.R
